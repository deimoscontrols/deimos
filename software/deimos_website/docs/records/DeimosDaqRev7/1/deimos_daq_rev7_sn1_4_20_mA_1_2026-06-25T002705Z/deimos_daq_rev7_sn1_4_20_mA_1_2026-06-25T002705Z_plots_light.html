        mode: "lines",
        type: "scatter",
        name: "Detected reference step",
        connectgaps: false,
        line: { width: 2, color: traceColor, dash: "dash" }
    }
], themedLayout({
    title: { text: "Detected steps and accepted calibration regions" },
    xaxis: { title: { text: "Time (s)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Current (mA)", standoff: 18 }, automargin: true },
    shapes: acceptedShapes,
    margin: { l: 88, r: 24, t: 72, b: 78 }
}), { responsive: true });

Plotly.newPlot("relative-error", [
    {
        x: errorAccuracyX,
        y: errorAccuracyY,
        mode: "lines",
        type: "scatter",
        fill: "toself",
        name: "Fluke 707 accuracy",
        line: { width: 0, color: accuracyFillColor },
        fillcolor: accuracyFillColor,
        hoverinfo: "skip"
    },
    {
        x: acceptedReference,
        y: errorPlotY,
        type: "box",
        name: "Error distribution",
        showlegend: false,
        boxpoints: false,
        boxmean: "sd",
        line: { width: 2, color: traceColor },
        fillcolor: boxFillColor,
        marker: { color: traceColor }
    },
    {
        x: acceptedReference,
        y: errorPlotY,
        mode: "markers",
        type: "scatter",
        name: "Samples",
        opacity: 0.5,
        marker: { symbol: "line-ew", size: 8, color: traceColor, line: { width: 1, color: traceColor } }
    },
    {
        x: errorMeanX,
        y: errorMeanY,
        mode: "markers",
        type: "scatter",
        name: "Mean",
        marker: { symbol: "diamond", size: 9, color: statisticColor }
    },
    {
        x: errorUncertaintyX,
        y: errorUncertaintyY,
        mode: "markers",
        type: "scatter",
        name: "3σ u<sub>μ</sub>",
        marker: { symbol: "line-ew", size: 16, color: statisticColor, line: { width: 2, color: statisticColor } }
    }
], themedLayout({
    title: { text: "Current error vs reference", y: 1.12, yanchor: "bottom" },
    xaxis: { title: { text: "Reference current (mA)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Error (mA)", standoff: 18 }, range: errorYAxisRange, automargin: true },
    boxmode: "group",
    margin: { l: 88, r: 24, t: 112, b: 78 }
}), { responsive: true });

Plotly.newPlot("voltage-fit", [
    {
        x: fitMeasuredX,
        y: fitExpectedY,
        mode: "markers",
        type: "scatter",
        name: "Accepted calibration samples",
        marker: { size: 5, color: traceColor }
    },
    {
        x: fitLineX,
        y: fitLineY,
        mode: "lines",
        type: "scatter",
        name: "Linear fit",
        line: { width: 2, color: traceColor }
    }
], themedLayout({
    title: { text: "Expected voltage vs measured voltage" },
    xaxis: { title: { text: "Measured voltage (V)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Expected voltage (V)", standoff: 18 }, automargin: true },
    margin: { l: 88, r: 24, t: 72, b: 78 }
}), { responsive: true });

Plotly.newPlot("voltage-fit-residual", [
    {
        x: residualAccuracyX,
        y: residualAccuracyY,
        mode: "lines",
        type: "scatter",
        fill: "toself",
        name: "Fluke 707 accuracy",
        line: { width: 0, color: accuracyFillColor },
        fillcolor: accuracyFillColor,
        hoverinfo: "skip"
    },
    {
        x: fitResidualReference,
        y: fitResidualY,
        type: "box",
        name: "Residual distribution",
        showlegend: false,
        boxpoints: false,
        boxmean: "sd",
        line: { width: 2, color: traceColor },
        fillcolor: boxFillColor,
        marker: { color: traceColor }
    },
    {
        x: fitResidualReference,
        y: fitResidualY,
        mode: "markers",
        type: "scatter",
        name: "Fit residual as current",
        opacity: 0.5,
        marker: { symbol: "line-ew", size: 8, color: traceColor, line: { width: 1, color: traceColor } }
    },
    {
        x: residualMeanX,
        y: residualMeanY,
        mode: "markers",
        type: "scatter",
        name: "Mean",
        marker: { symbol: "diamond", size: 9, color: statisticColor }
    },
    {
        x: residualUncertaintyX,
        y: residualUncertaintyY,
        mode: "markers",
        type: "scatter",
        name: "3σ u<sub>μ</sub>",
        marker: { symbol: "line-ew", size: 16, color: statisticColor, line: { width: 2, color: statisticColor } }
    }
], themedLayout({
    title: { text: "Residual after voltage fit, expressed as current", y: 1.12, yanchor: "bottom" },
    xaxis: { title: { text: "Reference current (mA)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Estimated current residual (uA)", standoff: 18 }, range: residualYAxisRange, automargin: true },
    boxmode: "group",
    margin: { l: 88, r: 24, t: 112, b: 78 }
}), { responsive: true });
</script>
</body>
</html>
