const textColor = "#171922";
const traceColor = "#000000";
const plotBackground = "#ffffff";
const gridColor = "#d8deea";
const boxFillColor = "rgba(0, 0, 0, 0.08)";
const accuracyFillColor = "rgba(130, 50, 186, 0.14)";

const baseLayout = {
    paper_bgcolor: plotBackground,
    plot_bgcolor: plotBackground,
    font: { color: textColor },
    legend: {
        font: { color: textColor },
        orientation: "h",
        x: 0,
        xanchor: "left",
        y: 1.02,
        yanchor: "bottom"
    }
};

function themedLayout(layout) {
    return {
        ...baseLayout,
        ...layout,
        xaxis: {
            gridcolor: gridColor,
            zerolinecolor: gridColor,
            linecolor: gridColor,
            tickcolor: gridColor,
            ...layout.xaxis
        },
        yaxis: {
            gridcolor: gridColor,
            zerolinecolor: gridColor,
            linecolor: gridColor,
            tickcolor: gridColor,
            ...layout.yaxis
        }
    };
}

    {
        x: rawTimeS,
        y: rawMeasuredMA,
        mode: "lines",
        type: "scatter",
        name: "Measured",
        line: { width: 1, color: traceColor }
    },
    {
        x: referenceStepTimeS,
        y: referenceStepMA,
        mode: "lines",
        type: "scatter",
        name: "Detected reference step",
        connectgaps: false,
        line: { width: 2, color: traceColor, dash: "dash" }

], themedLayout({
    title: { text: "Detected steps and accepted calibration regions" },
