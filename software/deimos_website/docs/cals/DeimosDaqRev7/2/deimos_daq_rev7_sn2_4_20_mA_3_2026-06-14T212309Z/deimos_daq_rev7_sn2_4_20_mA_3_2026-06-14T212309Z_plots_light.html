        }
    };
}

Plotly.newPlot("time-overlay", [
    {
        x: rawTimeS,
        y: rawMeasuredMA,
        mode: "lines",
        type: "scatter",
        name: "Measured",
        line: { width: 1, color: traceColor }
    },
    {
        x: referenceStepTimeS,
        y: referenceStepMA,
        mode: "lines",
        type: "scatter",
        name: "Detected reference step",
        connectgaps: false,
        line: { width: 2, color: traceColor, dash: "dash" }
    }
], themedLayout({
    title: { text: "Detected steps and accepted calibration regions" },
    xaxis: { title: { text: "Time (s)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Current (mA)", standoff: 18 }, automargin: true },
    shapes: acceptedShapes,
    margin: { l: 88, r: 24, t: 64, b: 78 }
}), { responsive: true });

Plotly.newPlot("relative-error", [
    {
        x: errorAccuracyX,
        y: errorAccuracyY,
        mode: "lines",
        type: "scatter",
        fill: "toself",
        name: "Fluke 707 accuracy range",
        line: { width: 0, color: accuracyFillColor },
        fillcolor: accuracyFillColor,
        hoverinfo: "skip"
    },
    {
        x: acceptedReference,
        y: errorPlotY,
        type: "box",
        name: "Error distribution",
        boxpoints: false,
        boxmean: "sd",
        line: { width: 2, color: traceColor },
        fillcolor: boxFillColor,
        marker: { color: traceColor }
    },
    {
        x: acceptedReference,
        y: errorPlotY,
        mode: "markers",
        type: "scatter",
        name: "Accepted samples",
        marker: { size: 4, color: traceColor }
    }
], themedLayout({
    title: { text: "Current error vs reference" },
    xaxis: { title: { text: "Reference current (mA)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Error (mA)", standoff: 18 }, range: errorYAxisRange, automargin: true },
    boxmode: "group",
    margin: { l: 88, r: 24, t: 64, b: 78 }
}), { responsive: true });

Plotly.newPlot("voltage-fit", [
    {
        x: fitMeasuredX,
        y: fitExpectedY,
        mode: "markers",
        type: "scatter",
        name: "Accepted calibration samples",
        marker: { size: 5, color: traceColor }
    },
    {
        x: fitLineX,
        y: fitLineY,
        mode: "lines",
        type: "scatter",
        name: "Linear fit",
        line: { width: 2, color: traceColor }
    }
], themedLayout({
    title: { text: "Expected voltage vs measured voltage" },
    xaxis: { title: { text: "Measured voltage (V)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Expected voltage (V)", standoff: 18 }, automargin: true },
    margin: { l: 88, r: 24, t: 100, b: 78 }
}), { responsive: true });

Plotly.newPlot("voltage-fit-residual", [
    {
        x: residualAccuracyX,
        y: residualAccuracyY,
        mode: "lines",
        type: "scatter",
        fill: "toself",
        name: "Fluke 707 accuracy range",
        line: { width: 0, color: accuracyFillColor },
        fillcolor: accuracyFillColor,
        hoverinfo: "skip"
    },
    {
        x: fitResidualReference,
        y: fitResidualY,
        type: "box",
        name: "Residual distribution",
        boxpoints: false,
        boxmean: "sd",
        line: { width: 2, color: traceColor },
        fillcolor: boxFillColor,
        marker: { color: traceColor }
    },
    {
        x: fitResidualReference,
        y: fitResidualY,
        mode: "markers",
        type: "scatter",
        name: "Fit residual as current",
        marker: { size: 5, color: traceColor }
    }
], themedLayout({
    title: { text: "Residual after voltage fit, expressed as current" },
    xaxis: { title: { text: "Reference current (mA)", standoff: 16 }, automargin: true },
    yaxis: { title: { text: "Estimated current residual (uA)", standoff: 18 }, range: residualYAxisRange, automargin: true },
    boxmode: "group",
    margin: { l: 88, r: 24, t: 64, b: 78 }
}), { responsive: true });
</script>
</body>
</html>
