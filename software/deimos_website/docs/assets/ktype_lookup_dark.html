function layout(title, xTitle, yTitle) {
    return {
        title: { text: title },
        margin: { l: 70, r: 24, t: 64, b: 64 },
        paper_bgcolor: "#2b2f3a",
        plot_bgcolor: "#2b2f3a",
        font: { color: "#f2f0f6" },
        xaxis: {
            title: { text: xTitle },
            gridcolor: "#47404f",
            zerolinecolor: "#47404f",
        },
        yaxis: {
            title: { text: yTitle },
            gridcolor: "#47404f",
            zerolinecolor: "#47404f",
        },
        showlegend: false,
    };
}

function lineTrace(x, y) {
    return {
        x,
        y,
        type: "scatter",
        mode: "lines",
        line: { color: "#f2f0f6", width: 2 },
    };
}

);
