# Sample configuration for the Deimos operator console.
# Run with: cargo run -p deimos_console -- --config software/deimos_console/examples/console.toml

# Multicast group the reporting dispatcher publishes to.
multicast_group = "239.255.0.1"

# UDP port (must match the reporting dispatcher's configured port).
port = 29573

# Outbound interface for multicast reception. Comment out to use the OS default.
# interface = "192.168.1.10"

# Per-session forensic log. When set, every received Row is appended as CSV with the
# viewer's wall-clock timestamp alongside the controller's sequence number and timestamps,
# so you can reconstruct exactly what was on the screen at any moment after the run.
# Each viewer session produces a unique file: the epoch-ns of the first Schema is appended
# to the stem, so prior runs are never overwritten. Files rotate at 64 MiB.
# Example: "/tmp/deimos-console.csv" → "/tmp/deimos-console_1713831234567890000.csv".
# Comment out to disable the log entirely.
forensic_log_path = "/tmp/deimos-console.csv"

# Display panels in two columns.
columns = 2

[[panels]]
title = "4-20 mA Currents"
channels = [
    "p1_4_20_mA_0_A.y",
    "p1_4_20_mA_1_A.y",
    "p1_4_20_mA_2_A.y",
    "p1_4_20_mA_3_A.y",
]

[[panels]]
title = "RTD Temperatures"
channels = [
    "p1_rtd_0.temperature_K",
    "p1_rtd_1.temperature_K",
    "p1_rtd_2.temperature_K",
]

[[panels]]
title = "Thermocouple Temperatures"
channels = [
    "p1_tc_0.temperature_K",
    "p1_tc_1.temperature_K",
]

[[panels]]
title = "0-2.5 V Inputs"
channels = [
    "p1_0_2V5_0_sense_V.y",
    "p1_0_2V5_1_sense_V.y",
]

[[panels]]
title = "0-15 V Inputs"
channels = [
    "p1_0_15V_0_sense_V.y",
    "p1_0_15V_1_sense_V.y",
]

[[panels]]
title = "26x Voltage Inputs"
channels = [
    "p1_x26_0_sense_V.y",
    "p1_x26_1_sense_V.y",
]
